services:
  - type: web
    name: yt-brazil-proxy
    runtime: docker
    plan: free
    region: sao-paulo   # ← only if Render offers São Paulo; otherwise leave it out
    healthCheckPath: /
    envVars:
      - key: PROXY_TOKEN
        generateValue: true   # Render will auto-create a secure token
      - key: PORT
        value: 8787
