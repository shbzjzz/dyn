<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NexusTV · Dynamic</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.7.14/dist/shaka-player.compiled.js"></script>
<style>
/* ══════════════════════════════════════════
   CSS VARIABLES
   ══════════════════════════════════════════ */
:root {
  --bg-deep: #040b14;
  --bg-mid: #071220;
  --glass-bg: rgba(255, 255, 255, 0.03);
  --glass-bg-hover: rgba(255, 255, 255, 0.07);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-border-hover: rgba(255, 255, 255, 0.18);
  --glass-blur: 24px;
  --glass-saturate: 1.6;
  --accent: #a78bfa;
  --accent-dim: rgba(167, 139, 250, 0.15);
  --accent-glow: rgba(167, 139, 250, 0.3);
  --accent-bright: #c4b5fd;
  --red: #f87171;
  --green: #34d399;
  --text-primary: #f1f5f9;
  --text-secondary: rgba(241, 245, 249, 0.55);
  --text-faint: rgba(241, 245, 249, 0.25);
  --font-heading: 'Rajdhani', sans-serif;
  --font-body: 'Inter', sans-serif;
  --radius-lg: 18px;
  --radius-md: 12px;
  --radius-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ═══ PREMIUM GLASSMORPHISM BACKGROUNDS ═══ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(167, 139, 250, 0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(56, 189, 248, 0.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(244, 114, 182, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse 40% 30% at 70% 20%, rgba(52, 211, 153, 0.05) 0%, transparent 50%),
    linear-gradient(180deg, #040b14 0%, #0a1628 50%, #071220 100%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ═══ GLASSMORPHISM CLASSES ═══ */
.glass {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(var(--glass-saturate));
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}

.glass-strong {
  background: rgba(255, 255, 255, 0.06);
  backdrop-filter: blur(32px) saturate(1.8);
  -webkit-backdrop-filter: blur(32px) saturate(1.8);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08), inset 0 -1px 0 rgba(0,0,0,0.2);
}

.glass-subtle {
  background: rgba(255, 255, 255, 0.02);
  backdrop-filter: blur(16px) saturate(1.3);
  -webkit-backdrop-filter: blur(16px) saturate(1.3);
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(167, 139, 250, 0.3); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(167, 139, 250, 0.5); }

/* ═══ ANIMATIONS ═══ */
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(0.6); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes floatOrbs {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(20px, 20px) scale(1.02); }
}

/* ═══ COMPONENTS ═══ */
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); box-shadow: 0 0 8px var(--red);
  animation: livePulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}

.channel-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-md);
  border: 1px solid transparent; cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative; overflow: hidden;
}
.channel-item::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--accent-dim), transparent 60%);
  opacity: 0; transition: opacity 0.3s; border-radius: inherit;
}
.channel-item:hover {
  background: var(--glass-bg-hover); border-color: var(--glass-border);
  transform: translateX(4px);
}
.channel-item:hover::before { opacity: 1; }
.channel-item.active {
  background: linear-gradient(135deg, rgba(167, 139, 250, 0.12), rgba(167, 139, 250, 0.04));
  border-color: rgba(167, 139, 250, 0.3);
  box-shadow: 0 0 20px rgba(167, 139, 250, 0.08);
}
.channel-item.active::before { opacity: 1; }

.match-card-glass {
  border-radius: var(--radius-md);
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.06);
  padding: 12px; transition: all 0.3s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
}
.match-card-glass:hover {
  border-color: rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  transform: translateY(-2px);
}

.group-card-glass {
  border-radius: var(--radius-lg);
  background: rgba(255, 255, 255, 0.04);
  backdrop-filter: blur(16px) saturate(1.4);
  -webkit-backdrop-filter: blur(16px) saturate(1.4);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
  transition: all 0.3s;
}
.group-card-glass:hover {
  border-color: rgba(167, 139, 250, 0.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(167,139,250,0.06), inset 0 1px 0 rgba(255,255,255,0.08);
}

/* Shaka player overrides */
.shaka-video-container { width: 100% !important; height: 100% !important; background: #000 !important; }
.shaka-video-container video { width: 100% !important; height: 100% !important; object-fit: contain !important; }

/* ═══ APP LAYOUT ═══ */
#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh; overflow: hidden;
  font-family: var(--font-body);
}

/* ═══ HEADER ═══ */
#app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; gap: 12px; height: 60px; flex-shrink: 0;
  position: relative; z-index: 50;
}
#app-header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.3;
}
.header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.header-center { display: flex; gap: 4px; padding: 4px; border-radius: var(--radius-sm); background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.logo-icon {
  width: 36px; height: 36px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; letter-spacing: 0.05em;
  background: linear-gradient(135deg, var(--accent), var(--accent-bright));
  color: #000; box-shadow: 0 0 20px var(--accent-glow);
  font-family: var(--font-heading);
}
.logo-text { display: flex; flex-direction: column; line-height: 1; }
.logo-title { font-size: 18px; font-weight: 700; letter-spacing: 0.12em; color: var(--text-primary); font-family: var(--font-heading); }
.logo-title span { color: var(--accent); }
.logo-sub { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-faint); margin-top: 1px; }

.nav-tab {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 6px; font-size: 12px;
  font-weight: 600; letter-spacing: 0.06em; cursor: pointer;
  transition: all 0.2s; border: 1px solid transparent;
  background: transparent; color: var(--text-secondary);
  font-family: var(--font-heading);
}
.nav-tab.active {
  background: linear-gradient(135deg, var(--accent-dim), rgba(167,139,250,0.06));
  color: var(--accent); border-color: rgba(167,139,250,0.3);
  box-shadow: 0 0 12px rgba(167,139,250,0.1);
}
.nav-tab i { font-size: 11px; }

.mobile-menu-btn {
  display: none; align-items: center; justify-content: center;
  width: 36px; height: 36px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
  cursor: pointer; transition: all 0.2s; color: var(--text-secondary); font-size: 14px;
}
.mobile-menu-btn:hover { background: rgba(255,255,255,0.1); }

.live-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--red); font-family: var(--font-heading); }

/* ═══ MAIN BODY ═══ */
#app-body { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 10; }

/* ═══ SIDEBAR ═══ */
#sidebar {
  width: 300px; flex-shrink: 0; display: flex; flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
}
#sidebar-header { padding: 14px 14px 10px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0; }
.sidebar-title-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.sidebar-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; font-family: var(--font-heading); color: var(--text-secondary); }
.sidebar-title i { color: var(--accent); }
.channel-count { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; padding: 2px 8px; border-radius: 999px; font-family: var(--font-heading); color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(167,139,250,0.2); }

.search-box {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: var(--radius-sm); margin-bottom: 10px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
  transition: border-color 0.2s;
}
.search-box:focus-within { border-color: rgba(167,139,250,0.3); }
.search-box i { font-size: 11px; color: var(--text-faint); }
.search-box input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 12px; color: var(--text-primary); font-family: var(--font-body);
}
.search-box input::placeholder { color: var(--text-faint); }

.cat-chips { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.cat-chips::-webkit-scrollbar { display: none; }
.cat-chip {
  white-space: nowrap; padding: 4px 10px; border-radius: 999px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  cursor: pointer; transition: all 0.2s;
  font-family: var(--font-heading); background: transparent;
  border: 1px solid var(--glass-border); color: var(--text-secondary);
}
.cat-chip.active {
  background: linear-gradient(135deg, var(--accent-dim), rgba(167,139,250,0.06));
  border-color: rgba(167,139,250,0.4); color: var(--accent);
}

#channel-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }

.ch-logo-box {
  width: 34px; height: 34px; flex-shrink: 0; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
}
.ch-logo-box img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }
.ch-logo-box i { font-size: 14px; color: var(--accent); }
.ch-info { flex: 1; min-width: 0; }
.ch-name { font-size: 12px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-primary); }
.ch-name.active-name { color: var(--accent); }
.ch-cat { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); font-family: var(--font-heading); margin-top: 1px; }
.ch-num { font-size: 10px; font-weight: 600; color: var(--text-faint); font-family: var(--font-heading); flex-shrink: 0; }
.ch-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.1); }
.ch-dot.active-dot { background: #f87171; box-shadow: 0 0 6px var(--red); animation: livePulse 1.4s ease-in-out infinite; }

.dash-badge {
  display: inline-block; margin-left: 4px; padding: 1px 6px; border-radius: 999px;
  font-size: 8px; font-weight: 600; background: rgba(56,189,248,0.15);
  color: #38bdf8; border: 1px solid rgba(56,189,248,0.25); vertical-align: middle;
}

.no-channels { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 8px; }
.no-channels i { font-size: 18px; color: var(--text-faint); }
.no-channels p { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); }

/* Sidebar overlay for mobile */
#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

/* ═══ MAIN CONTENT ═══ */
#main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── TV VIEW ── */
#tv-view { display: flex; flex: 1; flex-direction: column; overflow: hidden; }
#tv-view-inner { display: flex; flex: 1; overflow: hidden; }

.player-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; padding: 12px; gap: 10px; }

/* Player frame */
.player-frame {
  flex: 1; position: relative; border-radius: var(--radius-lg); overflow: hidden;
  background: #000; min-height: 0;
  box-shadow: 0 0 0 1px var(--glass-border), 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(167,139,250,0.06);
}
/* When player-frame is fullscreen, ensure children fill it */
.player-frame:-webkit-full-screen { width: 100vw; height: 100vh; border-radius: 0; }
.player-frame:-moz-full-screen    { width: 100vw; height: 100vh; border-radius: 0; }
.player-frame:fullscreen          { width: 100vw; height: 100vh; border-radius: 0; }
.player-frame:fullscreen #tv-iframe,
.player-frame:-webkit-full-screen #tv-iframe,
.player-frame:-moz-full-screen #tv-iframe { border-radius: 0; }

.player-inner-glow {
  position: absolute; inset: 0; border-radius: var(--radius-lg); pointer-events: none; z-index: 5;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
}
/* Hide glow border in fullscreen so embeds fill edge-to-edge */
.player-frame:fullscreen .player-inner-glow,
.player-frame:-webkit-full-screen .player-inner-glow,
.player-frame:-moz-full-screen .player-inner-glow { display: none; }
#player-container { position: absolute; inset: 0; z-index: 1; }
#tv-video {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none;
  border-radius: var(--radius-lg); object-fit: contain;
}
.player-frame:fullscreen #tv-video,
.player-frame:-webkit-full-screen #tv-video,
.player-frame:-moz-full-screen #tv-video { border-radius: 0; }
#tv-iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: none;
  border-radius: 0; display: none; z-index: 10;
}

/* Overlay */
#player-overlay {
  position: absolute; inset: 0; z-index: 20; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  border-radius: var(--radius-lg); transition: opacity 0.5s;
  background: rgba(4,11,20,0.9); backdrop-filter: blur(8px);
}
.player-frame:fullscreen #player-overlay,
.player-frame:-webkit-full-screen #player-overlay,
.player-frame:-moz-full-screen #player-overlay { border-radius: 0; }
#player-overlay.hidden { opacity: 0; pointer-events: none; }
.overlay-spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 2px solid rgba(167,139,250,0.2);
  border-top-color: var(--accent);
  animation: spin 0.9s linear infinite;
}
.overlay-msg { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-align: center; font-family: var(--font-heading); color: var(--accent); }
.overlay-proxy { font-size: 10px; letter-spacing: 0.08em; font-family: var(--font-heading); color: var(--text-faint); }

/* Controls bar — below player */
#hover-controls {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-radius: var(--radius-md); padding: 8px 14px;
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-border);
}
.ctrl-group { display: flex; align-items: center; gap: 8px; }
.ctrl-btn {
  width: 32px; height: 32px; border-radius: 8px; display: flex;
  align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.2s; background: rgba(255,255,255,0.07);
  border: 1px solid var(--glass-border); color: var(--text-primary); font-size: 12px;
}
.ctrl-btn:hover { background: rgba(255,255,255,0.12); }
.ctrl-btn i.muted-icon { color: var(--red); }
.vol-slider {
  width: 80px; height: 3px; border-radius: 999px; appearance: none;
  cursor: pointer; background: rgba(255,255,255,0.12); accent-color: var(--accent);
}
.vol-slider::-webkit-slider-thumb { appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }

/* Info bar */
.info-bar { flex-shrink: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.info-card {
  display: flex; align-items: center; gap: 10px; padding: 8px 12px;
  border-radius: var(--radius-md); flex: 1; min-width: 180px;
}
.info-logo {
  width: 32px; height: 32px; border-radius: 8px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  background: rgba(255,255,255,0.05);
}
.info-logo img { width: 100%; height: 100%; object-fit: contain; }
.info-logo i { font-size: 14px; color: var(--accent); }
.info-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-faint); font-family: var(--font-heading); }
.info-name { font-size: 13px; font-weight: 600; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── RIGHT DRAWER (Scoreboard) ── */
#scoreboard {
  width: 320px; flex-shrink: 0; display: flex; flex-direction: column;
}
#scoreboard-header {
  padding: 14px 14px 10px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
}
.sb-title { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.12em; font-family: var(--font-heading); color: var(--accent); }
.sb-title i { font-size: 12px; }
#scoreboard-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

.match-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--glass-border); }
.match-comp { font-size: 9px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.match-status {
  font-size: 9px; font-weight: 700; letter-spacing: 0.08em; padding: 2px 6px; border-radius: 999px;
  font-family: var(--font-heading); white-space: nowrap;
}
.match-status.live { color: var(--red); background: rgba(248,113,113,0.15); border: 1px solid rgba(248,113,113,0.3); animation: livePulse 1.4s ease-in-out infinite; }
.match-status.done { color: var(--green); background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.2); }
.match-status.sched { color: var(--text-faint); background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border); }

.match-body { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.team-col { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 38%; }
.team-logo { width: 28px; height: 28px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6)); }
.team-name { font-size: 10px; font-weight: 600; text-align: center; line-height: 1.2; color: var(--text-primary); }
.score-box {
  font-size: 20px; font-weight: 700; padding: 4px 12px; border-radius: 8px;
  text-align: center; min-width: 60px; font-family: var(--font-heading);
  color: var(--accent); background: var(--accent-dim);
  border: 1px solid rgba(167,139,250,0.2); letter-spacing: 0.05em;
}

.no-data { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; gap: 8px; }
.no-data i { font-size: 18px; color: var(--text-faint); }
.no-data p { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); }

/* ── STANDINGS VIEW ── */
#standings-view { display: none; flex: 1; overflow-y: auto; padding: 14px; }
#standings-view.active { display: block; }
.standings-inner { max-width: 1200px; margin: 0 auto; }
.standings-title { display: flex; align-items: center; gap: 8px; font-size: 20px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 16px; font-family: var(--font-heading); color: var(--accent); }
.standings-title i { font-size: 18px; }
.standings-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
.group-title { font-size: 13px; font-weight: 700; letter-spacing: 0.1em; margin-bottom: 10px; font-family: var(--font-heading); color: var(--accent); }
.group-table { width: 100%; border-collapse: collapse; }
.group-table th { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-heading); color: var(--text-faint); padding-bottom: 4px; text-align: right; }
.group-table th:nth-child(1), .group-table th:nth-child(2) { text-align: left; }
.group-table td { padding: 6px 0; font-size: 11px; color: var(--text-secondary); text-align: right; }
.group-table td:nth-child(1) { padding-right: 4px; }
.group-table td:nth-child(2) { text-align: left; }
.group-table tr { border-top: 1px solid var(--glass-border); }
.team-cell { display: flex; align-items: center; gap: 6px; }
.team-cell img { width: 16px; height: 16px; object-fit: contain; }
.team-cell span { font-size: 11px; font-weight: 600; color: var(--text-primary); }
.pts-cell { font-size: 13px; font-weight: 700; color: var(--accent); font-family: var(--font-heading); text-align: right; }

/* ═══ MOBILE BOTTOM NAV ═══ */
#mobile-nav { display: none; }
#mobile-nav.show { display: flex; }
.mobile-nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; border: none; background: transparent; color: var(--text-secondary);
  padding: 0; font-family: var(--font-heading);
}
.mobile-nav-btn i { font-size: 14px; }
.mobile-nav-btn span { font-size: 9px; font-weight: 600; letter-spacing: 0.08em; }
.mobile-nav-btn.active { color: var(--accent); }

/* ═══ FLOATING ORBS ═══ */
.orb {
  position: absolute; border-radius: 50%; pointer-events: none;
}
.orb-1 { width: 500px; height: 500px; opacity: 0.07; background: radial-gradient(circle, rgba(167,139,250,0.6), transparent 70%); top: -10%; left: -5%; animation: floatOrbs 20s ease-in-out infinite; }
.orb-2 { width: 400px; height: 400px; opacity: 0.05; background: radial-gradient(circle, rgba(56,189,248,0.6), transparent 70%); bottom: -10%; right: -5%; animation: floatOrbs 25s ease-in-out infinite reverse; }
.orb-3 { width: 300px; height: 300px; opacity: 0.04; background: radial-gradient(circle, rgba(244,114,182,0.6), transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: floatOrbs 30s ease-in-out infinite; }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 900px) {
  .mobile-menu-btn { display: flex; }
  #sidebar {
    position: absolute; top: 0; bottom: 0; left: 0;
    transform: translateX(-100%);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay.show { display: block; }

  #tv-view-inner { flex-direction: column; }

  #mobile-nav.show {
    display: flex; align-items: stretch; position: relative; z-index: 60; flex-shrink: 0;
    height: 56px; background: rgba(4,11,20,0.92);

    border-top: 1px solid var(--glass-border);
  }
  .player-area { padding: 8px; gap: 8px; }
}

@media (min-width: 1024px) {
  #tv-view-inner { flex-direction: row; }
}

@media (max-width: 1023px) and (min-width: 901px) {
  #scoreboard { width: 260px; }
  #tv-view-inner { flex-direction: row; }
}

/* Hide scrollbar for category chips */
.cat-chips { -ms-overflow-style: none; scrollbar-width: none; }

/* ═══ DYNAMIC ADDITIONS ═══ */
.cd-time { font-size: 22px; font-weight: 700; letter-spacing: 2px; font-family: var(--font-heading); color: var(--text-primary); }
.cd-notice { font-size: 13px; color: var(--accent); margin-top: 8px; display: none; text-align: center; }

.flag-emoji-sm { font-size: 18px; line-height: 1; }

.ch-match-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.match-card-glass .team-logo-flag { font-size: 22px; margin-right: 6px; }
.standings-grid .team-logo-flag { font-size: 16px; margin-right: 4px; }
.source-badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: var(--accent-dim); color: var(--accent); margin-left: 6px; }
#player-wrap { display: flex; }
#countdown-overlay { display: flex; }
</style>
</head>
<body>

<!-- ═══ APP ═══ -->

  <!-- Floating Orbs -->

  <!-- ═══ MOBILE BOTTOM NAV ═══ -->

<script>
/* ══════════════════════════════════════════
   SHAKA POLYFILL
   ══════════════════════════════════════════ */
try { shaka.polyfill.installAll(); } catch(e) {}

/* ══════════════════════════════════════════
   DYNAMIC CHANNEL DATA (populated at runtime)
   ══════════════════════════════════════════ */
const CHANNELS = [];

/* ══════════════════════════════════════════
   WORKER CONFIG
   ══════════════════════════════════════════ */
const WORKER = 'https://m3u.shabeershz21.workers.dev';

/* ══════════════════════════════════════════
   FLAG EMOJI SYSTEM
   ══════════════════════════════════════════ */
const COUNTRY_MAP = {
  ARG:'AR',AUS:'AU',BEL:'BE',BRA:'BR',CAN:'CA',CHI:'CL',COL:'CO',
  CRC:'CR',CRO:'HR',DEN:'DK',ECU:'EC',ENG:'GB',ESP:'ES',FRA:'FR',
  GER:'DE',GHA:'GH',IRN:'IR',ITA:'IT',JPN:'JP',KOR:'KR',MEX:'MX',
  MAR:'MA',NED:'NL',NGA:'NG',PAN:'PA',PER:'PE',POL:'PL',POR:'PT',
  QAT:'QA',SAU:'SA',SEN:'SN',SRB:'RS',SUI:'CH',TUN:'TN',URU:'UY',
  USA:'US',WAL:'GB',NOR:'NO',SWE:'SE',CIV:'CI',TUR:'TR',
};

const NAME_MAP = {
  'argentina':'ARG','australia':'AUS','belgium':'BEL','brazil':'BRA',
  'canada':'CAN','chile':'CHI','colombia':'COL','costa rica':'CRC',
  'croatia':'CRO','denmark':'DEN','ecuador':'ECU','england':'ENG',
  'spain':'ESP','france':'FRA','germany':'GER','ghana':'GHA',
  'iran':'IRN','italy':'ITA','japan':'JPN','south korea':'KOR',
  'korea republic':'KOR','mexico':'MEX','morocco':'MAR','netherlands':'NED',
  'nigeria':'NGA','panama':'PAN','peru':'PER','poland':'POL',
  'portugal':'POR','qatar':'QA','saudi arabia':'SAU','senegal':'SEN',
  'serbia':'SRB','switzerland':'SUI','swiss':'SUI','tunisia':'TUN',
  'uruguay':'URY','usa':'USA','united states':'USA','wales':'WAL',
  'norway':'NOR','sweden':'SWE','ivory coast':'CIV',"c\u00f4te d\u2019ivoire":'CIV',
  'cote divoire':'CIV','turkey':'TUR',
};

function codeToFlag(code3) {
  const c2 = COUNTRY_MAP[code3] || code3.slice(0,2).toUpperCase();
  if (c2.length !== 2) return '\u{1F3F3}\uFE0F';
  return c2.toUpperCase().replace(/./g, ch =>
    String.fromCodePoint(127397 + ch.charCodeAt(0))
  );
}

function getFlag(teamName) {
  if (!teamName) return '\u{1F3F3}\uFE0F';
  const key = teamName.toLowerCase().trim();
  const code3 = NAME_MAP[key];
  if (code3) return codeToFlag(code3);
  return '\u{1F3F3}\uFE0F';
}

/* ══════════════════════════════════════════
   TIME FORMATTING
   ══════════════════════════════════════════ */
function formatMatchTime(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
  } catch(e) { return ''; }
}

function formatMatchTimeShort(isoStr) {
  if (!isoStr) return '';
  try {
    const d = new Date(isoStr);
    return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit', hour12: true });
  } catch(e) { return ''; }
}

function getMatchStatus(match) {
  if (!match.start) return 'upcoming';
  const now = Date.now();
  const start = new Date(match.start).getTime();
  const end = match.end ? new Date(match.end).getTime() : start + 7200000;
  if (now >= start && now <= end) return 'live';
  if (now > end) return 'finished';
  return 'upcoming';
}

/* ══════════════════════════════════════════
   STATE
   ══════════════════════════════════════════ */
let activeId = null;
let selectedCat = 'All';
let searchQ = '';
let sidebarOpen = false;
let currentView = 'tv';
let liveEvents = [];
let standings = [];
let proxyOn = false;
let isMuted = false;
let volume = 0.8;
let showControls = false;
let isMobile = false;
let hlsInstance = null;
let shakaInstance = null;
let dashManifestUrl = '';
let wcMatches = [];
let matchSource = '';

/* ══════════════════════════════════════════
   DOM REFS
   ══════════════════════════════════════════ */
const $video = document.getElementById('tv-video');
const $iframe = document.getElementById('tv-iframe');
const $playerContainer = document.getElementById('player-container');
const $playerOverlay = document.getElementById('player-overlay');
const $overlayMsg = document.getElementById('overlay-msg');
const $overlayProxy = document.getElementById('overlay-proxy');
const $hoverControls = document.getElementById('hover-controls');
const $muteBtn = document.getElementById('mute-btn');
const $volSlider = document.getElementById('vol-slider');
const $fsBtn = document.getElementById('fs-btn');
const $playBtn = document.getElementById('play-btn');
const $refreshBtn = document.getElementById('refresh-btn');
const $playerFrame = document.getElementById('player-frame');
const $infoLogo = document.getElementById('info-logo');
const $infoName = document.getElementById('info-name');
const $sidebar = document.getElementById('sidebar');
const $sidebarOverlay = document.getElementById('sidebar-overlay');
const $menuBtn = document.getElementById('menu-btn');
const $searchInput = document.getElementById('search-input');
const $catChips = document.getElementById('cat-chips');
const $channelList = document.getElementById('channel-list');
const $chCount = document.getElementById('ch-count');
const $scoreboardList = document.getElementById('scoreboard-list');
const $standingsGrid = document.getElementById('standings-grid');
const $tvView = document.getElementById('tv-view');
const $standingsView = document.getElementById('standings-view');
const $mobileNav = document.getElementById('mobile-nav');
const $countdownOverlay = document.getElementById('countdown-overlay');
const $cdTimer = document.getElementById('cd-timer');
const $cdTime = document.getElementById('cd-time');
const $cdNotice = document.getElementById('cd-notice');
const $playerWrap = document.getElementById('player-wrap');

/* ══════════════════════════════════════════
   CATEGORIES
   ══════════════════════════════════════════ */
const categories = ['All'];

function renderCatChips() {
  const cats = ['All', ...new Set(CHANNELS.map(c => c.category))];
  $catChips.innerHTML = cats.map(cat =>
    `<button class="cat-chip ${cat === selectedCat ? 'active' : ''}" data-cat="${cat}">${cat}</button>`
  ).join('');
}

/* ══════════════════════════════════════════
   FILTERED CHANNELS
   ══════════════════════════════════════════ */
function getFiltered() {
  return CHANNELS.filter(c => {
    const catOk = selectedCat === 'All' || c.category === selectedCat;
    const searchOk = c.name.toLowerCase().includes(searchQ.toLowerCase()) || c.category.toLowerCase().includes(searchQ.toLowerCase());
    return catOk && searchOk;
  });
}

/* ══════════════════════════════════════════
   RENDER CHANNEL LIST
   ══════════════════════════════════════════ */
function renderChannels() {
  const filtered = getFiltered();
  $chCount.textContent = filtered.length;

  if (filtered.length === 0) {
    $channelList.innerHTML = '<div class="no-channels"><i class="fa-solid fa-search"></i><p>No channels found</p></div>';
    return;
  }

  $channelList.innerHTML = filtered.map(ch => {
    const isActive = ch.id === activeId;
    const isNext = ch.isNext;
    const timeLabel = ch.timeLabel ? `<div class="ch-match-time">${ch.timeLabel}</div>` : '';
    const nextBadge = isNext ? ' <span style="font-size:10px;background:var(--accent);color:#000;padding:1px 6px;border-radius:4px;font-weight:700">NEXT</span>' : '';

    return `
      <div class="channel-item ${isActive ? 'active' : ''} ${isNext ? 'next-match' : ''}" data-id="${ch.id}">
        <div class="ch-logo-box">
          ${ch.logo ? `<img src="${ch.logo}" alt="${ch.name}" onerror="this.style.display='none'">` : `<i class="fa-solid fa-tv"></i>`}
        </div>
        <div class="ch-info">
          <div class="ch-name ${isActive ? 'active-name' : ''}">${ch.name}${nextBadge}</div>
          <div class="ch-cat">${ch.category}</div>
          ${timeLabel}
        </div>
        <span class="ch-num">${ch.number}</span>
        <div class="ch-dot ${isActive ? 'active-dot' : ''}"></div>
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════════
   OVERLAY HELPERS
   ══════════════════════════════════════════ */
function showOverlay(msg) {
  $overlayMsg.textContent = msg;
  $overlayProxy.textContent = 'PROXY: ' + (proxyOn ? 'ON' : 'OFF');
  $playerOverlay.classList.remove('hidden');
}
function hideOverlay() {
  $playerOverlay.classList.add('hidden');
}

/* ══════════════════════════════════════════
   DESTROY PLAYERS
   ══════════════════════════════════════════ */
function destroyPlayers() {
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  if (shakaInstance) {
    try { shakaInstance.destroy(); } catch(e) {}
    shakaInstance = null;
  }
  if (dashManifestUrl) { URL.revokeObjectURL(dashManifestUrl); dashManifestUrl = ''; }
  $iframe.src = 'about:blank';
  $iframe.style.display = 'none';
  $playerContainer.innerHTML = '';
  if (!$playerWrap.contains($video)) {
    $playerWrap.insertBefore($video, $playerOverlay);
  }
}

/* ══════════════════════════════════════════
   PLAY CHANNEL
   ══════════════════════════════════════════ */
function playChannel(id, useProxy) {
  if (useProxy === undefined) useProxy = false;
  const ch = CHANNELS.find(c => c.id === id);
  if (!ch) return;

  // If it's a WC match, process it specially
  if (ch.isWcMatch && ch.matchData) {
    processWCMatches([ch.matchData]);
    return;
  }

  activeId = id;
  proxyOn = useProxy;
  showOverlay(useProxy ? 'ROUTING VIA PROXY...' : 'TUNING: ' + ch.name.toUpperCase());

  // Hide countdown for non-match channels
  $countdownOverlay.style.display = 'none';
  $playerWrap.style.display = '';
  if (window._cdInterval) clearInterval(window._cdInterval);

  destroyPlayers();

  // EMBED MODE
  if (ch.isEmbed) {
    $video.style.display = 'none';
    $iframe.style.display = 'block';
    $iframe.style.borderRadius = '0';
    hideOverlay();
    $iframe.src = ch.url;
    $iframe.onload = () => hideOverlay();
    $infoName.textContent = ch.name;
    $infoLogo.innerHTML = ch.logo ? `<img src="${ch.logo}" style="width:100%;height:100%;object-fit:contain">` : '<i class="fa-solid fa-tv"></i>';
    renderChannels();
    return;
  }

  // M3U8 / DASH
  const url = useProxy ? `${WORKER}/stream?url=${encodeURIComponent(ch.url)}` : ch.url;
  loadStream(url, ch);
}

function loadStream(url, ch) {
  const isDash = ch && ch.isDash;
  const isHls = url.includes('.m3u8') && !isDash;

  if (isHls) {
    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: true, lowLatencyMode: true });
      hlsInstance.loadSource(url);
      hlsInstance.attachMedia($video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        $video.play().catch(() => {});
        hideOverlay();
      });
      hlsInstance.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) showOverlay('HLS STREAM ERROR — TRY REFRESH');
      });
    } else if ($video.canPlayType('application/vnd.apple.mpegurl')) {
      $video.src = url;
      $video.addEventListener('loadedmetadata', () => { $video.play().catch(() => {}); hideOverlay(); }, { once: true });
    }
    $video.style.display = '';
    $iframe.style.display = 'none';
    $playerContainer.innerHTML = '';
    if (!$playerWrap.contains($video)) $playerWrap.appendChild($video);
  } else if (isDash) {
    loadDashStream(url, ch);
  } else {
    $iframe.style.display = 'block';
    $iframe.src = url;
    $iframe.onload = () => hideOverlay();
    $video.style.display = 'none';
  }
}

function loadDashStream(url, ch) {
  try {
    shakaInstance = new shaka.Player();
    $playerContainer.innerHTML = '';
    $playerContainer.appendChild($video);
    $video.style.display = '';
    $iframe.style.display = 'none';
    shakaInstance.attach($video);
    shakaInstance.configure({ streaming: { bufferingGoal: 30, rebufferingGoal: 2 } });
    shakaInstance.load(url).then(() => {
      $video.play().catch(() => {});
      hideOverlay();
    }).catch(e => {
      showOverlay('DASH LOAD ERROR — ' + e.message);
    });
  } catch(e) {
    showOverlay('DASH NOT SUPPORTED');
  }
}

/* ══════════════════════════════════════════
   MATCH DATA FETCHING (dual-source)
   ══════════════════════════════════════════ */
async function fetchWCMatches() {
  try {
    const res = await fetch(`${WORKER}/matches`);
    if (!res.ok) throw new Error(`Worker ${res.status}`);
    const data = await res.json();
    wcMatches = data.matches || [];
    matchSource = data.source || 'none';

    if (data.scrapeError) {
      console.warn('[WC] Scrape error:', data.scrapeError);
    }
    console.log(`[WC] Got ${wcMatches.length} matches from ${matchSource}`);

    if (wcMatches.length > 0) {
      injectMatchChannels(wcMatches);
      const live = wcMatches.filter(m => getMatchStatus(m) === 'live');
      const next = wcMatches.filter(m => getMatchStatus(m) === 'upcoming').sort((a,b) => new Date(a.start) - new Date(b.start));
      if (live.length > 0) processWCMatches([live[0]]);
      else if (next.length > 0) processWCMatches([next[0]]);
    } else {
      console.log('[WC] No matches from scraper, trying ESPN fallback...');
      tryESPNFallback();
    }
  } catch(e) {
    console.error('[WC] Failed to fetch matches:', e.message);
    tryESPNFallback();
  }
}

async function tryESPNFallback() {
  try {
    console.log('[WC] Trying ESPN fallback via worker...');
    const res = await fetch(`${WORKER}/scoreboard`);
    if (!res.ok) throw new Error(`ESPN proxy ${res.status}`);
    const data = await res.json();
    const events = (data.events || []).filter(e =>
      (e.competitions[0]?.competitors || []).length >= 2
    );

    const espnMatches = events.map(ev => {
      const c = ev.competitions[0];
      const t1 = c.competitors[0];
      const t2 = c.competitors[1];
      const state = ev.status.type.state;
      return {
        team1: t1.team.shortDisplayName || t1.team.displayName,
        team2: t2.team.shortDisplayName || t2.team.displayName,
        score1: t1.score,
        score2: t2.score,
        status: state === 'in' ? 'live' : state === 'post' ? 'finished' : 'upcoming',
        timeLabel: ev.status.type.shortDetail || '',
        start: c.date || '',
        link: '',
        source: 'espn',
        round: ev.name || 'FIFA World Cup'
      };
    });

    console.log(`[WC] ESPN fallback: ${espnMatches.length} matches`);
    if (espnMatches.length > 0) {
      injectMatchChannels(espnMatches);
    }
  } catch(e2) {
    console.error('[WC] ESPN fallback also failed:', e2.message);
  }
}

/* ══════════════════════════════════════════
   INJECT MATCH CHANNELS INTO SIDEBAR
   ══════════════════════════════════════════ */
function injectMatchChannels(matches) {
  const existingIds = new Set(CHANNELS.map(c => c.id));

  matches.forEach((m, i) => {
    const status = m.status || getMatchStatus(m);
    const id = `wc-match-${i}`;
    if (existingIds.has(id)) return;

    let name = '';
    if (m.result && m.result !== 'vs') {
      name = `${getFlag(m.team1)} ${m.team1} ${m.result} ${m.team2} ${getFlag(m.team2)}`;
    } else {
      name = `${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)}`;
    }

    let timeLabel = '';
    if (m.timeLabel) {
      timeLabel = m.timeLabel;
    } else if (m.start) {
      timeLabel = formatMatchTimeShort(m.start);
    } else if (m.time) {
      timeLabel = m.time;
    }

    let statusIcon = '\u23F0';
    if (status === 'live') statusIcon = '\u{1F534}';
    else if (status === 'finished') statusIcon = '\u2705';

    CHANNELS.push({
      id,
      name: `${statusIcon} ${name}`,
      category: 'World Cup 2026',
      logo: '',
      number: String(100 + i),
      isEmbed: !!m.link,
      url: m.link || '',
      isWcMatch: true,
      matchData: m,
      timeLabel,
      matchStatus: status
    });
  });

  // Mark next upcoming match
  const now = Date.now();
  let nextIdx = -1;
  let nextStart = Infinity;
  CHANNELS.forEach((ch, i) => {
    if (ch.isWcMatch && ch.matchStatus === 'upcoming' && ch.matchData?.start) {
      const ms = new Date(ch.matchData.start).getTime();
      if (ms > now && ms < nextStart) {
        nextStart = ms;
        nextIdx = i;
      }
    }
  });
  if (nextIdx >= 0) CHANNELS[nextIdx].isNext = true;

  renderCatChips();
  renderChannels();
}

/* ══════════════════════════════════════════
   SHOW MATCH IN PLAYER
   ══════════════════════════════════════════ */
function processWCMatches(matches) {
  if (!matches || matches.length === 0) return;
  const m = matches[0];
  const status = m.status || getMatchStatus(m);

  // Set active channel in sidebar
  const chIdx = CHANNELS.findIndex(c => c.isWcMatch && c.matchData &&
    c.matchData.team1 === m.team1 && c.matchData.team2 === m.team2);
  if (chIdx >= 0) activeId = CHANNELS[chIdx].id;
  renderChannels();

  if (status === 'live') showLiveMatch(m);
  else if (status === 'finished') showFinishedMatch(m);
  else showUpcomingMatch(m);
}

function showUpcomingMatch(m) {
  if (!m.start && !m.time) return;

  $countdownOverlay.style.display = 'flex';
  $playerWrap.style.display = 'none';
  $cdTime.style.display = 'block';
  $cdNotice.style.display = 'block';
  $cdNotice.textContent = 'Streaming links will be available 10 minutes before match';
  destroyPlayers();

  if (m.start) {
    $cdTime.textContent = `${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)}  —  ${formatMatchTime(m.start)}`;
    const start = new Date(m.start).getTime();
    const diff = start - Date.now();

    if (diff <= 0) {
      fetchWCStream(m);
      return;
    }

    // Update countdown
    function updateCd() {
      const remaining = new Date(m.start).getTime() - Date.now();
      if (remaining <= 0) {
        clearInterval(window._cdInterval);
        $cdNotice.textContent = 'Stream is now available! Loading...';
        fetchWCStream(m);
        return;
      }
      const mins10 = 10 * 60 * 1000;
      if (remaining <= mins10) {
        $cdNotice.textContent = 'Stream available soon! Links will appear shortly';
      }
      const h = Math.floor(remaining / 3600000);
      const min = Math.floor((remaining % 3600000) / 60000);
      const sec = Math.floor((remaining % 60000) / 1000);
      $cdTimer.textContent = `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }
    updateCd();
    if (window._cdInterval) clearInterval(window._cdInterval);
    window._cdInterval = setInterval(updateCd, 1000);
  } else {
    $cdTime.textContent = `${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)}  —  ${m.time}`;
    $cdTimer.textContent = '00:00:00';
  }
}

function showLiveMatch(m) {
  $countdownOverlay.style.display = 'none';
  $playerWrap.style.display = '';
  $cdNotice.style.display = 'none';
  $cdTime.style.display = 'none';
  if (window._cdInterval) clearInterval(window._cdInterval);
  fetchWCStream(m);
}

function showFinishedMatch(m) {
  $countdownOverlay.style.display = 'flex';
  $playerWrap.style.display = 'none';
  $cdNotice.style.display = 'none';
  $cdTime.style.display = 'block';
  destroyPlayers();
  if (m.result && m.result !== 'vs') {
    $cdTime.textContent = `${getFlag(m.team1)} ${m.team1} ${m.result} ${m.team2} ${getFlag(m.team2)} — Full Time`;
  } else {
    $cdTime.textContent = `${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)} — Finished`;
  }
  if (window._cdInterval) clearInterval(window._cdInterval);
}

function fetchWCStream(m) {
  if (!m.link) {
    $countdownOverlay.style.display = 'flex';
    $playerWrap.style.display = 'none';
    $cdTime.style.display = 'block';
    $cdTime.textContent = `${getFlag(m.team1)} ${m.team1} vs ${m.team2} ${getFlag(m.team2)}`;
    $cdNotice.style.display = 'block';
    $cdNotice.textContent = m.start
      ? `Stream not yet available. Match at ${formatMatchTime(m.start)}`
      : 'Stream link not available yet';
    return;
  }
  const embedUrl = `${WORKER}/stream?url=${encodeURIComponent(m.link)}`;
  playEmbed(embedUrl, m);
}

function playEmbed(url, m) {
  $countdownOverlay.style.display = 'none';
  $playerWrap.style.display = '';
  $iframe.style.display = 'block';
  $video.style.display = 'none';
  hideOverlay();
  $iframe.src = url;
  if (m) {
    const name = `${m.team1} vs ${m.team2}`;
    $infoName.textContent = name;
    $infoLogo.innerHTML = `<span class="flag-emoji">${getFlag(m.team1)}</span>`;
  }
}

/* ══════════════════════════════════════════
   ESPN DATA (via worker proxy)
   ══════════════════════════════════════════ */
async function fetchScoreboard() {
  try {
    const res = await fetch(`${WORKER}/scoreboard`);
    if (!res.ok) return;
    const data = await res.json();
    liveEvents = data.events || [];
    renderScoreboard();
  } catch(e) {}
}

async function fetchStandings() {
  try {
    const res = await fetch(`${WORKER}/standings`);
    if (!res.ok) return;
    const data = await res.json();
    standings = data.children || [];
    renderStandings();
  } catch(e) {}
}

function renderScoreboard() {
  if (liveEvents.length === 0) {
    $scoreboardList.innerHTML = '<div class="no-data"><i class="fa-solid fa-futbol"></i><p>No live data</p></div>';
    return;
  }

  $scoreboardList.innerHTML = liveEvents.map(ev => {
    const c = ev.competitions[0];
    const t1 = c.competitors[0];
    const t2 = c.competitors[1];
    const state = ev.status.type.state;
    const statusCls = state === 'in' ? 'live' : state === 'post' ? 'done' : 'sched';
    return `
      <div class="match-card-glass">
        <div class="match-header">
          <span class="match-comp">${ev.name}</span>
          <span class="match-status ${statusCls}">${ev.status.type.shortDetail}</span>
        </div>
        <div class="match-body">
          <div class="team-col">
            <span class="team-logo-flag">${getFlag(t1.team.shortDisplayName || t1.team.displayName)}</span>
            <span class="team-name">${t1.team.shortDisplayName}</span>
          </div>
          <div class="score-box">${t1.score}\u2013${t2.score}</div>
          <div class="team-col">
            <span class="team-logo-flag">${getFlag(t2.team.shortDisplayName || t2.team.displayName)}</span>
            <span class="team-name">${t2.team.shortDisplayName}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function renderStandings() {
  if (standings.length === 0) {
    $standingsGrid.innerHTML = '<div class="no-data"><i class="fa-solid fa-circle-notch" style="animation:spin 1s linear infinite"></i><p>Loading standings...</p></div>';
    return;
  }

  $standingsGrid.innerHTML = standings.map(group => {
    const teams = (group.standings && group.standings.entries) || [];
    return `
      <div class="group-card-glass">
        <h3 class="group-title">${group.name}</h3>
        <table class="group-table">
          <thead>
            <tr>
              <th colspan="2">Team</th>
              <th>W</th><th>D</th><th>L</th><th>Pts</th>
            </tr>
          </thead>
          <tbody>
            ${teams.map((t, ti) => {
              const getStat = (name) => (t.stats && t.stats.find(s => s.name === name)) ? t.stats.find(s => s.name === name).value : '\u2014';
              return `
                <tr>
                  <td style="padding-right:4px;color:var(--text-secondary)">${ti + 1}</td>
                  <td><div class="team-cell"><span class="team-logo-flag">${getFlag(t.team.displayName)}</span><span>${t.team.displayName}</span></div></td>
                  <td>${getStat('wins')}</td>
                  <td>${getStat('ties')}</td>
                  <td>${getStat('losses')}</td>
                  <td class="pts-cell">${getStat('points')}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════════
   VIEW SWITCHING
   ══════════════════════════════════════════ */
function setView(view) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  document.querySelectorAll('.mobile-nav-btn[data-view]').forEach(t => {
    t.classList.toggle('active', t.dataset.view === view);
  });
  if (view === 'tv') {
    $tvView.style.display = '';
    $standingsView.classList.remove('active');
  } else {
    $tvView.style.display = 'none';
    $standingsView.classList.add('active');
  }
}

/* ══════════════════════════════════════════
   SIDEBAR TOGGLE (MOBILE)
   ══════════════════════════════════════════ */
function toggleSidebar(open) {
  sidebarOpen = open;
  $sidebar.classList.toggle('open', open);
  $sidebarOverlay.classList.toggle('show', open);
}

/* ══════════════════════════════════════════
   RESPONSIVE CHECK
   ══════════════════════════════════════════ */
function checkMobile() {
  isMobile = window.innerWidth <= 900;
  $mobileNav.classList.toggle('show', isMobile);
  if (!isMobile) toggleSidebar(false);
}

/* ══════════════════════════════════════════
   EVENT LISTENERS
   ══════════════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => setView(tab.dataset.view));
});

document.getElementById('mob-channels').addEventListener('click', () => toggleSidebar(true));
document.querySelectorAll('.mobile-nav-btn[data-view]').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

$menuBtn.addEventListener('click', () => toggleSidebar(!sidebarOpen));
$sidebarOverlay.addEventListener('click', () => toggleSidebar(false));
$searchInput.addEventListener('input', (e) => { searchQ = e.target.value; renderChannels(); });

$catChips.addEventListener('click', (e) => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  selectedCat = chip.dataset.cat;
  renderCatChips();
  renderChannels();
});

$channelList.addEventListener('click', (e) => {
  const item = e.target.closest('.channel-item');
  if (!item) return;
  const id = item.dataset.id;
  playChannel(id);
  if (isMobile) toggleSidebar(false);
});

$refreshBtn.addEventListener('click', () => {
  if (activeId) playChannel(activeId, false);
});

$muteBtn.addEventListener('click', () => {
  isMuted = !isMuted;
  $video.muted = isMuted;
  $muteBtn.innerHTML = isMuted ? '<i class="fa-solid fa-volume-xmark"></i>' : '<i class="fa-solid fa-volume-high"></i>';
});

$volSlider.addEventListener('input', (e) => {
  volume = parseFloat(e.target.value);
  $video.volume = volume;
});

$fsBtn.addEventListener('click', () => {
  const el = $iframe.style.display !== 'none' ? $iframe : $video;
  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
});

$playBtn.addEventListener('click', () => {
  if ($video.paused) $video.play().catch(() => {});
  else $video.pause();
});

window.addEventListener('resize', checkMobile);

/* ══════════════════════════════════════════
   INIT
   ══════════════════════════════════════════ */
checkMobile();
renderCatChips();
renderChannels();
setView('tv');

// Fetch data
fetchWCMatches();
fetchScoreboard();
fetchStandings();
setInterval(fetchScoreboard, 30000);
setInterval(() => { fetchWCMatches(); }, 120000);  // refresh matches every 2 min

</script>
