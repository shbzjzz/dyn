function formatMatchTime(isoString) {
  if (!isoString) return '';
  try {
    const d = new Date(isoString);
    if (isNaN(d.getTime())) return '';
    const now = new Date();
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    if (d.toDateString() === now.toDateString()) return hh + ':' + mm;
    return d.getDate() + ' ' + ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()] + ' ' + hh + ':' + mm;
  } catch (e) { return ''; }
}

function getMatchStatus(m) {
  if (m.source === 'espn' && (m.status === 'live' || m.status === 'finished')) return m.status;
  
  const now = Date.now();
  let startTs = 0, endTs = 0;
  if (m.start) { const sd = new Date(m.start); if (!isNaN(sd.getTime())) startTs = sd.getTime(); }
  if (m.end) { const ed = new Date(m.end); if (!isNaN(ed.getTime())) endTs = ed.getTime(); }
  
  if (endTs > 0 && endTs <= now) return 'finished';
  if (startTs > 0 && startTs <= now) return 'live';
  if (startTs > now) return 'upcoming';
  
  return 'upcoming';
}

function showError(msg, duration) { errorMsg.textContent = msg; errorMsg.classList.add('show'); if (duration) setTimeout(() => errorMsg.classList.remove('show'), duration); }
function hideError() { errorMsg.classList.remove('show'); }
function checkMobile() {
  isMobile = window.innerWidth < 768;
  if (isMobile) { sidebar.style.display = 'none'; mobileBar.style.display = 'flex'; } 
  else { sidebar.style.display = 'flex'; mobileBar.style.display = 'none'; }
}

function cleanHTML(html) { if (!html) return ''; return html.replace(/<style[\s\S]*?<\/style>/gi, '').replace(/<script[\s\S]*?<\/script>/gi, ''); }

function parseMatchCards(html, sourceLabel) {
  const matches = [];
  if (!html) return matches;
  const cleaned = cleanHTML(html);
  const openerRe = /<div[^>]*class\s*=\s*["'][^"']*match-event[^"']*["'][^>]*>/gi;
  let openerMatch;
  while ((openerMatch = openerRe.exec(cleaned)) !== null) {
    const startIdx = openerMatch.index;
    const openerTag = openerMatch[0];
    let depth = 1;
    let i = startIdx + openerTag.length;
    while (i < cleaned.length && depth > 0) {
      const openDiv = cleaned.indexOf('<div', i);
      const closeDiv = cleaned.indexOf('</div>', i);
      if (closeDiv === -1) break;
      if (openDiv !== -1 && openDiv < closeDiv) { depth++; i = openDiv + 4; } 
      else { depth--; i = closeDiv + 6; }
    }
    const block = cleaned.substring(startIdx, i);
    let result = '', start = '', end = '', team1 = '', team2 = '', link = '';
    const resultM = openerTag.match(/data-result\s*=\s*["']([^"']*)["']/i); if (resultM) result = resultM[1];
    const startM = openerTag.match(/data-start\s*=\s*["']([^"']*)["']/i); if (startM) start = startM[1];
    const endM = openerTag.match(/data-gameends\s*=\s*["']([^"']*)["']/i); if (endM) end = endM[1];
    const t1M = block.match(/first-team[\s\S]*?team-name[^>]*>([^<]*)/i); if (t1M) team1 = t1M[1].trim();
    const t2M = block.match(/left-team[\s\S]*?team-name[^>]*>([^<]*)/i); if (t2M) team2 = t2M[1].trim();
    const linkM = block.match(/href\s*=\s*["']([^"']+)["']/i); if (linkM) link = linkM[1].trim();
    if (team1 || team2 || link) {
      const key = (team1 + '-' + team2).toLowerCase().trim();
      if (!matches.some(m => (m.team1 + '-' + m.team2).toLowerCase().trim() === key)) {
        matches.push({ team1, team2, result, link, start, end, source: sourceLabel });
      }
    }
  }
  return matches;
}

function parseGenericHTML(html, sourceLabel, baseUrl) {
  const matches = [];
  if (!html) return matches;
  const cleaned = cleanHTML(html);
  const linkRe = /<a[^>]*href\s*=\s*["']([^"']+)["'][^>]*>([\s\S]*?)<\/a>/gi;
  let linkM;
  while ((linkM = linkRe.exec(cleaned)) !== null) {
    const href = linkM[1];
    const inner = linkM[2];
    const text = inner.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
    
    const vsM = text.match(/([A-Za-z][A-Za-z\s.]+?)\s+vs\.?\s+([A-Za-z][A-Za-z\s.]+)/i);
    if (vsM && href && !href.includes('javascript:') && !href.startsWith('#') && !/google|facebook|twitter|youtube|blogger|blogspot|instagram|whatsapp|telegram|t\.me/i.test(href)) {
      const team1 = vsM[1].trim();
      const team2 = vsM[2].trim();
      const key = (team1 + '-' + team2).toLowerCase();
      if (!matches.some(m => (m.team1 + '-' + m.team2).toLowerCase() === key)) {
        let absUrl = href;
        try { absUrl = new URL(href, baseUrl).href; } catch(e) {}
        
        matches.push({ 
          team1, team2, 
          time: '', 
          result: '', 
          link: absUrl, 
          start: '', 
          end: '', 
          round: '', 
          source: sourceLabel 
        });
      }
    }
  }
  return matches;
}

async function fetchViaCORS(url) {
  for (const proxyBase of CORS_PROXIES) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);
      let proxyUrl = proxyBase.includes('thingproxy') ? proxyBase + url : proxyBase + encodeURIComponent(url);
      const res = await fetch(proxyUrl, { signal: controller.signal });
      clearTimeout(timeout);
      if (!res.ok) continue;
      const text = await res.text();
      if (text && text.length > 100) return text;
    } catch (e) {}
  }
  return null;
}

async function fetchWCMatches() {
  try {
    const res = await fetch(WORKER + '/matches');
    if (res.ok) {
      const data = await res.json();
      if (data.matches && data.matches.length > 0) {
        matchSource = data.source || 'worker';
        wcMatches = data.matches;
        injectMatchChannels(wcMatches);
        processWCMatches(wcMatches);
        return;
      }
    }
  } catch (e) {}

  for (const source of SCRAPE_URLS) {
    try {
      const html = await fetchViaCORS(source.url);
      if (!html) continue;
      let matches = parseMatchCards(html, source.label);
      if (matches.length === 0) matches = parseGenericHTML(html, source.label, source.url);
      if (matches.length > 0) {
        matchSource = source.label;
        wcMatches = matches;
        injectMatchChannels(matches);
        processWCMatches(matches);
        return;
      }
    } catch (e) {}
  }
  await tryESPNFallback();
}

async function tryESPNFallback() {
  try {
    const res = await fetch(WORKER + '/scoreboard');
    if (!res.ok) return;
    const data = await res.json();
    const espnMatches = [];
    if (data.events) {
      for (const ev of data.events) {
        for (const comp of (ev.competitions || [])) {
          if (!comp.competitors) continue;
          const t1 = comp.competitors[0] || {};
          const t2 = comp.competitors[1] || {};
          let status = 'upcoming';
          if (comp.status?.type?.state === 'in') status = 'live';
          else if (comp.status?.type?.state === 'post') status = 'finished';
          espnMatches.push({
            team1: t1.team?.displayName || '', team2: t2.team?.displayName || '',
            result: '', link: '', start: comp.date || ev.date || '', end: '', round: ev.note || '',
            source: 'espn', status, score1: t1.score || '', score2: t2.score || ''
          });
        }
      }
    }
    if (espnMatches.length > 0) {
      wcMatches = espnMatches;
      matchSource = 'espn';
      injectMatchChannels(espnMatches);
      processWCMatches(espnMatches);
    }
  } catch (e) {}
}

function injectMatchChannels(matches) {
  for (let i = 0; i < matches.length; i++) {
    const m = matches[i];
    const id = 'wc-match-' + i;
    if (CHANNELS.some(c => c.id === id)) continue;
    const status = getMatchStatus(m);
    const flag1 = codeToFlag(m.team1Code || m.team1, 'small');
    const flag2 = codeToFlag(m.team2Code || m.team2, 'small');
    let icon = '📺', badge = '';
    if (status === 'live') { 
      icon = '🔴'; badge = 'LIVE'; 
    } else if (status === 'upcoming') { 
      icon = '⏰'; 
      let timeStr = formatMatchTime(m.start);
      if (!timeStr) timeStr = 'Upcoming';
      badge = timeStr; 
    } else { 
      icon = '🏁'; badge = (m.result || 'FT'); 
    }
    CHANNELS.push({
      id, isWcMatch: true, matchData: m,
      channelName: flag1 + ' ' + m.team1 + ' vs ' + m.team2 + ' ' + flag2,
      icon, badge, status, category: 'wc', onClick: () => fetchWCStream(m)
    });
  }
  renderCatChips();
  renderChannels();
}

function renderCatChips() {
  const cats = [{ key: 'all', label: 'All' }, { key: 'wc', label: 'World Cup' }];
  if (CHANNELS.some(c => c.status === 'live')) cats.push({ key: 'live', label: 'Live' });
  catChips.innerHTML = cats.map(c => `<div class="cat-chip ${activeCategory === c.key ? 'active' : ''}" onclick="setCategory('${c.key}')">${c.label}</div>`).join('');
}

function setCategory(cat) { activeCategory = cat; renderCatChips(); renderChannels(); }

function renderChannels() {
  let filtered = CHANNELS;
  if (activeCategory === 'wc') filtered = CHANNELS.filter(c => c.isWcMatch);
  else if (activeCategory === 'live') filtered = CHANNELS.filter(c => c.status === 'live');
  filtered.sort((a, b) => {
    const order = { live: 0, upcoming: 1, finished: 2 };
    return (order[a.status] || 3) - (order[b.status] || 3);
  });
  channelList.innerHTML = filtered.map(c => {
    let meta = '';
    if (c.status === 'live') meta = '<span class="live-dot"></span><span class="live-badge">LIVE</span>';
    else if (c.status === 'upcoming') meta = '<i class="far fa-clock"></i> ' + (c.badge || '');
    else meta = '<i class="fas fa-flag-checkered"></i> ' + (c.badge || 'FT');
    return `<div class="channel-item ${activeChannel === c.id ? 'active' : ''}" onclick="selectChannel('${c.id}')"><div class="channel-icon">${c.icon || '📺'}</div><div class="channel-info"><div class="channel-name">${c.channelName || 'Unknown'}</div><div class="channel-meta">${meta}</div></div></div>`;
  }).join('');
  if (isMobile) {
    mobileBar.innerHTML = filtered.map(c => `<div class="mobile-channel ${activeChannel === c.id ? 'active' : ''}" onclick="selectChannel('${c.id}')">${c.icon || '📺'} ${c.channelName ? c.channelName.substring(0, 30) : ''}</div>`).join('');
  }
}

function selectChannel(id) {
  activeChannel = id;
  const ch = CHANNELS.find(c => c.id === id);
  if (ch && ch.onClick) ch.onClick();
  renderChannels();
}

function processWCMatches(matches) {
  if (!matches.length) return;
  let target = matches.find(m => getMatchStatus(m) === 'live');
  if (!target) target = matches.find(m => getMatchStatus(m) === 'upcoming');
  if (!target) target = matches[0];
  const status = getMatchStatus(target);
  if (status === 'live') showLiveMatch(target);
  else if (status === 'upcoming') showUpcomingMatch(target);
  else showFinishedMatch(target);
}

function showLiveMatch(m) {
  hideCountdown();
  iframe.style.display = 'block';
  video.style.display = 'none';
  playerWrap.style.display = 'block';
  fetchWCStream(m);
  npFlag.innerHTML = codeToFlag(m.team1Code || m.team1) + ' ' + codeToFlag(m.team2Code || m.team2);
  npName.textContent = m.team1 + ' vs ' + m.team2;
  npScore.textContent = m.result || '';
}

function showUpcomingMatch(m) {
  showCountdown(m);
  iframe.src = 'about:blank';
  iframe.style.display = 'none';
  video.style.display = 'none';
  countdownOverlay.style.display = 'flex';
  
  npFlag.innerHTML = codeToFlag(m.team1Code || m.team1) + ' ' + codeToFlag(m.team2Code || m.team2);
  npName.textContent = m.team1 + ' vs ' + m.team2;
  npScore.textContent = '';
}

function showFinishedMatch(m) {
  hideCountdown();
  iframe.src = 'about:blank';
  iframe.style.display = 'none';
  video.style.display = 'none';
  countdownOverlay.style.display = 'none';
  
  npFlag.innerHTML = codeToFlag(m.team1Code || m.team1) + ' ' + codeToFlag(m.team2Code || m.team2);
  npName.textContent = m.team1 + ' vs ' + m.team2;
  npScore.textContent = m.result || 'FT';
}

function showCountdown(m) {
  cdFlag1.innerHTML = codeToFlag(m.team1Code || m.team1, 'large');
  cdFlag2.innerHTML = codeToFlag(m.team2Code || m.team2, 'large');
  cdTeam1.textContent = m.team1;
  cdTeam2.textContent = m.team2;
  
  if (countdownInterval) clearInterval(countdownInterval);
  
  const updateCountdown = () => {
    if (!m.start) {
      cdTimer.textContent = '--:--:--:--';
      cdNotice.textContent = 'Waiting for match schedule... Links available 10 mins before start.';
      return;
    }
    const target = new Date(m.start).getTime();
    const now = Date.now();
    const diff = target - now;
    
    if (diff <= 0) {
      cdTimer.textContent = '00:00:00:00';
      cdNotice.textContent = 'Match is starting!';
      clearInterval(countdownInterval);
      setTimeout(() => showLiveMatch(m), 2000);
      return;
    }
    
    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
    
    cdTimer.textContent = 
      String(days).padStart(2, '0') + ':' +
      String(hours).padStart(2, '0') + ':' +
      String(minutes).padStart(2, '0') + ':' +
      String(seconds).padStart(2, '0');
    
    if (diff <= 10 * 60 * 1000) {
      cdNotice.textContent = 'Streaming links are now available!';
    } else {
      cdNotice.textContent = 'Streaming links will be available 10 minutes before the match';
    }
  };
  
  updateCountdown();
  countdownInterval = setInterval(updateCountdown, 1000);
}

function hideCountdown() {
  countdownOverlay.style.display = 'none';
  if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
}

function fetchWCStream(m) {
  const status = getMatchStatus(m);
  if (status === 'upcoming') {
    showUpcomingMatch(m);
    return;
  }
  
  if (!m.link) {
    showError('Stream not yet available for this match', 5000);
    return;
  }
  playEmbed(WORKER + '/stream?url=' + encodeURIComponent(m.link), m);
}

function playEmbed(url, m) {
  hideCountdown();
  countdownOverlay.style.display = 'none';
  iframe.style.display = 'block';
  video.style.display = 'none';
  showOverlay('RESOLVING STREAM...');
  hideError();
  iframe.src = url;
  let loaded = false;
  iframe.onload = () => { loaded = true; hideOverlay(); };
  iframe.onerror = () => { hideOverlay(); showError('Failed to load stream. Try another server.', 5000); };
  setTimeout(() => { if (!loaded) hideOverlay(); }, 25000);
  if (m) {
    npFlag.innerHTML = codeToFlag(m.team1Code || m.team1) + ' ' + codeToFlag(m.team2Code || m.team2);
    npName.textContent = m.team1 + ' vs ' + m.team2;
    npScore.textContent = m.result || '';
  }
}

async function fetchScoreboard() {
  try {
    const res = await fetch(WORKER + '/scoreboard');
    if (!res.ok) return;
    const data = await res.json();
    if (!data.events || data.events.length === 0) { scoreboardSection.innerHTML = ''; return; }
    let html = '<div class="espn-card"><div class="espn-title"><i class="fas fa-table"></i> Live Scores</div><div class="score-grid">';
    for (const ev of data.events) {
      const comp = ev.competitions && ev.competitions[0];
      if (!comp || !comp.competitors) continue;
      const t1 = comp.competitors[0] || {};
      const t2 = comp.competitors[1] || {};
      const t1Name = t1.team ? t1.team.displayName : '';
      const t2Name = t2.team ? t2.team.displayName : '';
      const t1Flag = t1.team ? codeToFlag(t1.team.abbreviation, 'small') : '';
      const t2Flag = t2.team ? codeToFlag(t2.team.abbreviation, 'small') : '';
      let statusText = '', statusClass = '';
      if (comp.status?.type) {
        statusText = comp.status.type.shortDetail || comp.status.type.detail || '';
        if (comp.status.type.state === 'in') statusClass = 'live';
        else if (comp.status.type.state === 'post') statusClass = 'final';
      }
      html += `<div class="score-item"><div class="score-row"><div class="score-team">${t1Flag}${t1Name}</div><div class="score-val">${t1.score || '0'}</div></div><div class="score-row"><div class="score-team">${t2Flag}${t2Name}</div><div class="score-val">${t2.score || '0'}</div></div><div class="score-status ${statusClass}">${statusText}</div></div>`;
    }
    html += '</div></div>';
    scoreboardSection.innerHTML = html;
  } catch (e) {}
}

async function fetchStandings() {
  try {
    const res = await fetch(WORKER + '/standings');
    if (!res.ok) return;
    const data = await res.json();
    
    const groups = data.children || [data];
    if (!groups.length) { standingsSection.innerHTML = ''; return; }
    
    let html = '<div class="espn-card"><div class="espn-title"><i class="fas fa-list-ol"></i> Group Standings</div>';
    
    for (const group of groups) {
      const entries = group.standings?.entries || group.entries || [];
      if (!entries.length) continue;
      
      html += `<div style="margin-bottom:16px"><div class="group-name">${group.name || 'Group'}</div><table class="standings-table"><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>Pts</th></tr></thead><tbody>`;
      
      for (let i = 0; i < entries.length; i++) {
        const entry = entries[i];
        let gp = '-', w = '-', d = '-', l = '-', pts = '-';
        for (const s of (entry.stats || [])) {
          const name = s.name || s.abbreviation;
          if (name === 'wins' || name === 'W') w = s.value;
          else if (name === 'ties' || name === 'draws' || name === 'D') d = s.value;
          else if (name === 'losses' || name === 'L') l = s.value;
          else if (name === 'gamesPlayed' || name === 'GP') gp = s.value;
          else if (name === 'points' || name === 'PTS') pts = s.value;
        }
        const teamName = entry.team?.displayName || '';
        const teamFlag = entry.team?.abbreviation ? codeToFlag(entry.team.abbreviation, 'small') : '';
        html += `<tr><td>${i + 1}</td><td><div class="standings-team">${teamFlag}${teamName}</div></td><td>${gp}</td><td>${w}</td><td>${d}</td><td>${l}</td><td><strong>${pts}</strong></td></tr>`;
      }
      html += '</tbody></table></div>';
    }
    html += '</div>';
    standingsSection.innerHTML = html;
  } catch (e) {}
}

muteBtn.addEventListener('click', () => { video.muted = !video.muted; muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>'; });
volSlider.addEventListener('input', (e) => { video.volume = e.target.value / 100; });
playBtn.addEventListener('click', () => { if (video.paused) { video.play(); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; } else { video.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; } });
fsBtn.addEventListener('click', () => { const elem = video.style.display !== 'none' ? video : iframe; if (elem.requestFullscreen) elem.requestFullscreen(); else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); });

window.setCategory = setCategory;
window.selectChannel = selectChannel;

document.addEventListener('DOMContentLoaded', () => {
  checkMobile();
  renderCatChips();
  renderChannels();
  fetchWCMatches();
  fetchScoreboard();
  fetchStandings();
  setInterval(fetchScoreboard, 30000);
  setInterval(fetchWCMatches, 120000);
});
window.addEventListener('resize', () => { checkMobile(); renderChannels(); });
</script>
